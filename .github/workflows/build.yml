name: Build APK (Unsigned)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
        echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Build libhevtun
      run: |
        chmod +x compile-hevtun.sh
        ./compile-hevtun.sh
        # 确保将编译出的库放入 app 的 libs 目录
        mkdir -p V2rayNG/app/libs
        cp -r libs/* V2rayNG/app/libs/ || true

    - name: Download libv2ray
      uses: robinraju/release-downloader@v1.10
      with:
        repository: '2dust/AndroidLibXrayLite'
        latest: true
        fileName: 'libv2ray.aar'
        out-file-path: 'V2rayNG/app/libs/'

    - name: Build Unsigned APK
      run: |
        cd V2rayNG
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$NDK_HOME" >> local.properties
        
        chmod +x gradlew
        # 执行 assembleRelease，但不传入签名信息
        ./gradlew assembleRelease --stacktrace

    - name: Upload arm64-v8a APK
      uses: actions/upload-artifact@v4
      with:
        name: v2rayNG-arm64-v8a-unsigned
        path: V2rayNG/app/build/outputs/apk/*/release/*arm64-v8a*.apk

    - name: Upload armeabi-v7a APK
      uses: actions/upload-artifact@v4
      with:
        name: v2rayNG-armeabi-v7a-unsigned
        path: V2rayNG/app/build/outputs/apk/*/release/*armeabi-v7a*.apk
